<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PetroGo - Emergency Fuel Delivery</title>
    <meta name="description" content="Emergency fuel delivery in 30-45 minutes." />
    <meta name="theme-color" content="#f97316" />
    <style>
      body { margin: 0; font-family: sans-serif; }
      #loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: #fff; z-index: 9999; }
      #loading-spinner { width: 50px; height: 50px; border: 4px solid #f3f4f6; border-top-color: #f97316; border-radius: 50%; animation: spin 0.8s linear infinite; }
      @keyframes spin { to { transform: rotate(360deg); } }
      .loaded #loading { display: none; }
    </style>
  </head>
  <body>
    <div id="loading"><div id="loading-spinner"></div></div>
    <div id="root"></div>
    <script>window.addEventListener('load', () => document.body.classList.add('loaded'));</script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
